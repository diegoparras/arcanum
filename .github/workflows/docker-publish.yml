name: Publicar imagen Docker (GHCR)

# Publica ghcr.io/<owner>/arcanum automaticamente:
#  - push a main           -> tag :latest + :sha
#  - tag vX.Y.Z (release)  -> tag :X.Y.Z + :latest
# Usa el GITHUB_TOKEN del runner (ya trae packages: write): sin tokens manuales.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags / labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/arcanum
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Escaneo de vulnerabilidades (Trivy, gate HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/arcanum:latest
          format: table
          exit-code: '0'   # informativo; subir a '1' para bloquear el release
          severity: HIGH,CRITICAL
          ignore-unfixed: true
